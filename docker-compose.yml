services:
  openlap:
    build: .
    container_name: openlap-raceboard
    restart: unless-stopped
    networks:
      - ${DOCKER_NETWORK}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${DOCKER_NETWORK}"
      - "traefik.http.routers.openlap.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.openlap.entrypoints=websecure"
      - "traefik.http.routers.openlap.tls.certresolver=letsencrypt"
      - "traefik.http.services.openlap.loadbalancer.server.port=80"

networks:
  ${DOCKER_NETWORK}:
    external: true
